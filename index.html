<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mio Pizza - Vincendo</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .tab-active { border-bottom: 4px solid #e11d48; color: #e11d48; font-weight: 800; }
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .offer-gradient { background: linear-gradient(90deg, #16a34a 0%, #15803d 100%); }
    </style>
</head>
<body class="bg-gray-50 pb-24 font-sans">

    <header class="bg-white sticky top-0 z-30 shadow-sm">
        <div class="p-4 text-center border-b">
            <h1 id="shop-name" class="text-xl font-black text-gray-900 tracking-tighter">MIO PIZZA VINCENDO</h1>
        </div>
        
        <div class="offer-gradient text-white p-3 overflow-hidden relative">
            <div class="flex flex-col items-center space-y-1 text-center">
                <span class="text-[10px] uppercase font-bold tracking-widest opacity-80">Offre du moment</span>
                <p class="text-sm font-black leading-tight">🍕 2 PIZZAS ACHETÉES = 1 OFFERTE*</p>
                <p class="text-[9px] italic opacity-90">*Sur tailles identiques (Valeur Margarita)</p>
            </div>
        </div>

        <nav id="cat-nav" class="flex overflow-x-auto p-3 space-x-6 bg-white border-b hide-scrollbar"></nav>
    </header>

    <main id="menu-container" class="p-4 space-y-4 max-w-md mx-auto"></main>

    <section class="p-4 max-w-md mx-auto mb-10">
        <h2 class="text-xs font-bold text-gray-400 uppercase mb-3">Suppléments & Pâte</h2>
        <div id="extras-container" class="bg-white rounded-2xl p-4 shadow-sm divide-y"></div>
    </section>

    <div class="fixed bottom-0 left-0 right-0 p-4 bg-white/90 backdrop-blur-md border-t z-40">
        <a id="call-btn" href="tel:0693645964" class="bg-[#e11d48] text-white w-full py-4 rounded-2xl font-black flex items-center justify-center gap-3 shadow-xl active:scale-95 transition-all uppercase text-sm">
            📞 Commander : 0693 64 59 64
        </a>
    </div>

    <script>
        let db = {};

        fetch('menu.json?v=' + Date.now())
            .then(r => r.json())
            .then(data => {
                db = data;
                document.getElementById('shop-name').innerText = data.config.nom_boutique;
                
                // 1. Navigation
                const nav = document.getElementById('cat-nav');
                data.categories.forEach((c, i) => {
                    const b = document.createElement('button');
                    b.id = 'btn-' + c.id;
                    b.className = "whitespace-nowrap pb-1 text-xs text-gray-400 uppercase font-bold";
                    b.innerHTML = c.emoji + " " + c.nom;
                    b.onclick = () => show(c.id);
                    nav.appendChild(b);
                    if(i === 0) show(c.id);
                });

                // 2. Extras
                const exC = document.getElementById('extras-container');
                data.extras.forEach(e => {
                    exC.innerHTML += `<div class="flex justify-between py-2 text-sm"><span class="text-gray-700">${e.nom}</span><span class="font-bold text-green-600">${e.prix}</span></div>`;
                });
            });

        function show(id) {
            // Tabs UI
            db.categories.forEach(c => {
                document.getElementById('btn-' + c.id).className = (c.id === id) ? "whitespace-nowrap pb-1 text-xs tab-active uppercase" : "whitespace-nowrap pb-1 text-xs text-gray-400 uppercase font-bold";
            });

            // Products list
            const container = document.getElementById('menu-container');
            container.innerHTML = '';
            const list = db.produits.filter(p => p.categorie === id);
            
            if(list.length === 0) {
                container.innerHTML = '<p class="text-center text-gray-400 py-10">Bientôt disponible...</p>';
                return;
            }

            list.forEach(p => {
                container.innerHTML += `
                    <div class="bg-white p-4 rounded-2xl shadow-sm border border-gray-100 flex items-center gap-4 animate-in slide-in-from-left duration-300">
                        <div class="flex-1">
                            <div class="flex justify-between items-start mb-1">
                                <h3 class="font-bold text-gray-800 uppercase text-sm">${p.nom}</h3>
                                <span class="text-[#e11d48] font-black text-sm">${p.prix}</span>
                            </div>
                            <p class="text-gray-500 text-[10px] leading-relaxed italic">${p.description}</p>
                        </div>
                    </div>`;
            });
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }
    </script>
</body>
</html>
