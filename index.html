<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MIO PIZZA Menu</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .tab-active { border-bottom: 4px solid #e11d48; color: #e11d48; font-weight: 900; }
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .price-col { text-align: center; background: #f9fafb; padding: 4px; border-radius: 6px; }
    </style>
</head>
<body class="bg-gray-100 pb-32 font-sans text-gray-900">

    <header class="bg-white sticky top-0 z-50 shadow-md">
        <div class="p-4 text-center border-b">
            <h1 id="shop-name" class="text-xl font-black italic tracking-tighter">MIO PIZZA VINCENDO</h1>
        </div>
        
        <div class="bg-green-600 p-2 text-white text-center">
            <p class="text-[10px] uppercase font-bold tracking-widest leading-none">Offre 7j/7</p>
            <p class="text-xs font-black italic">2 PIZZAS ACHETÉES = 1 OFFERTE *</p>
        </div>

        <nav id="cat-nav" class="flex overflow-x-auto p-3 space-x-6 bg-white border-b hide-scrollbar"></nav>
    </header>

    <main id="menu-container" class="p-4 space-y-4 max-w-md mx-auto"></main>

    <section class="p-4 max-w-md mx-auto">
        <h2 class="text-[10px] font-bold text-gray-400 uppercase mb-2">Extras & Suppléments</h2>
        <div id="extras-container" class="bg-white rounded-2xl p-4 shadow-sm space-y-3"></div>
    </section>

    <div class="fixed bottom-0 left-0 right-0 p-4 bg-white/95 border-t z-50 shadow-2xl">
        <a id="call-btn" href="tel:0693645964" class="bg-[#e11d48] text-white w-full py-4 rounded-xl font-black flex items-center justify-center gap-3 shadow-lg active:scale-95 transition-all uppercase text-sm">
            📞 Appeler : 0693 64 59 64
        </a>
    </div>

    <script>
        let db = {};

        fetch('menu.json?v=' + Date.now())
            .then(r => r.json())
            .then(data => {
                db = data;
                document.getElementById('shop-name').innerText = data.config.nom_boutique;
                
                const nav = document.getElementById('cat-nav');
                data.categories.forEach((c, i) => {
                    const b = document.createElement('button');
                    b.id = 'btn-' + c.id;
                    b.className = "whitespace-nowrap pb-1 text-xs text-gray-400 uppercase font-bold";
                    b.innerHTML = c.emoji + " " + c.nom;
                    b.onclick = () => show(c.id);
                    nav.appendChild(b);
                    if(i === 0) show(c.id);
                });

                const exC = document.getElementById('extras-container');
                data.extras.forEach(e => {
                    let priceHtml = Array.isArray(e.prix) 
                        ? `<div class="grid grid-cols-4 gap-2 mt-1">${e.prix.map((v,idx)=>`<div class="text-center bg-gray-50 rounded p-1"><span class="text-[7px] block uppercase text-gray-400">${['Min','P','M','G'][idx]}</span><span class="text-[10px] font-bold">${v}€</span></div>`).join('')}</div>`
                        : `<span class="text-green-600 font-bold">${e.prix}</span>`;
                    
                    exC.innerHTML += `<div class="pb-2 last:pb-0 border-b last:border-0"><div class="flex justify-between text-xs font-bold"><span>${e.nom}</span>${!Array.isArray(e.prix)?priceHtml:''}</div>${Array.isArray(e.prix)?priceHtml:''}</div>`;
                });
            });

        function show(catId) {
            db.categories.forEach(c => {
                document.getElementById('btn-' + c.id).className = (c.id === catId) ? "whitespace-nowrap pb-1 text-xs tab-active uppercase" : "whitespace-nowrap pb-1 text-xs text-gray-400 uppercase font-bold";
            });

            const container = document.getElementById('menu-container');
            container.innerHTML = '';
            
            db.produits.filter(p => p.categorie === catId).forEach(p => {
                container.innerHTML += `
                    <div class="bg-white p-4 rounded-2xl shadow-sm border border-gray-100">
                        <div class="flex justify-between items-start mb-1">
                            <h3 class="font-black text-gray-800 uppercase text-[13px] tracking-tight">${p.nom}</h3>
                        </div>
                        <p class="text-gray-400 text-[9px] mb-3 leading-tight italic">${p.desc}</p>
                        
                        <div class="grid grid-cols-4 gap-2">
                            ${p.prix.map((v, i) => `
                                <div class="price-col border ${v === '-' ? 'opacity-20' : 'border-gray-50'}">
                                    <span class="block text-[7px] text-gray-400 uppercase font-bold">${['Mini','P','M','G'][i]}</span>
                                    <span class="text-[11px] font-black ${v === '-' ? 'text-gray-300' : 'text-red-600'}">${v}${v !== '-' ? '€' : ''}</span>
                                </div>
                            `).join('')}
                        </div>
                    </div>`;
            });
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }
    </script>
</body>
</html>
